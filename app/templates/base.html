<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ title }} — 自动运营系统</title>
    <link rel="stylesheet" href="/static/style.css?v=3">
</head>
<body>
    <!-- 移动端顶栏（桌面端隐藏） -->
    <div class="mobile-header">
        <button class="hamburger-btn" onclick="toggleSidebar()" aria-label="菜单">☰</button>
        <span class="mobile-logo">🤖 自动运营</span>
    </div>

    <!-- 侧边栏遮罩 -->
    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <aside class="sidebar" id="sidebar">
        <h1 class="logo">🤖 自动运营</h1>
        <nav>
            <div class="nav-section-label">自动带货</div>
            <a href="/admin" class="{{ 'active' if request.url.path == '/admin' }}">📊 仪表盘</a>
            <a href="/admin/products" class="{{ 'active' if request.url.path == '/admin/products' }}">📦 商品管理</a>
            <a href="/admin/sources" class="{{ 'active' if request.url.path == '/admin/sources' }}">🔗 商品源</a>
            <a href="/admin/schedules" class="{{ 'active' if request.url.path == '/admin/schedules' }}">⏰ 定时任务</a>
            <a href="/admin/earnings" class="{{ 'active' if request.url.path == '/admin/earnings' }}">💰 收益看板</a>
            <a href="/admin/posts" class="{{ 'active' if request.url.path == '/admin/posts' }}">📋 发布记录</a>
            <div class="nav-section-label">自动养号</div>
            <a href="/admin/nurture" class="{{ 'active' if request.url.path == '/admin/nurture' }}">🌱 自动养号</a>
            <a href="/admin/nurture/records" class="{{ 'active' if request.url.path == '/admin/nurture/records' }}">📋 养号记录</a>
            <a href="/admin/nurture/report" class="{{ 'active' if request.url.path == '/admin/nurture/report' }}">📈 效果分析</a>
            <a href="/admin/accounts" class="{{ 'active' if request.url.path == '/admin/accounts' }}">👤 账号管理</a>
        </nav>
        <div class="sidebar-footer">
            <a href="/docs" target="_blank">📖 API 文档</a>
        </div>
    </aside>

    <main class="content">
        {% block content %}{% endblock %}
    </main>

    <script>
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.querySelector('.sidebar-overlay');
        const isOpen = sidebar.classList.contains('open');
        if (isOpen) {
            sidebar.classList.remove('open');
            overlay.classList.remove('visible');
        } else {
            sidebar.classList.add('open');
            overlay.classList.add('visible');
        }
    }
    // 点击导航链接后自动关闭侧边栏
    document.querySelectorAll('.sidebar nav a').forEach(a => {
        a.addEventListener('click', () => {
            document.getElementById('sidebar').classList.remove('open');
            document.querySelector('.sidebar-overlay').classList.remove('visible');
        });
    });
</script>
</body>
</html>
